<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZenQ AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0716">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZenQ">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ============ RESET ============ */
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }

:root{
  --bg-top:#05040a;
  --bg-mid:#140b33;
  --bg-glow:#4b3aa8;
  --accent:#8f7bff;
  --accent-2:#b39dff;
  --accent-soft:rgba(143,123,255,0.16);
  --accent-line:rgba(143,123,255,0.35);
  --text:#e8e3ff;
  --text-dim:#9a90c9;
  --danger:#ff5d7a;
  --glass:rgba(20,14,40,0.55);
  --glass-2:rgba(30,20,60,0.6);
  --ease:cubic-bezier(.22,1,.36,1);
  font-family:'Rajdhani',sans-serif;
}

body{
  background:
    radial-gradient(ellipse 90% 60% at 20% 100%, rgba(90,68,200,0.55), transparent 60%),
    radial-gradient(ellipse 90% 60% at 80% 100%, rgba(90,68,200,0.5), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 40%, rgba(60,40,140,0.35), transparent 70%),
    linear-gradient(180deg, var(--bg-top) 0%, #0a0620 45%, var(--bg-mid) 100%);
  height:100vh;
  overflow:hidden;
  color:var(--text);
  position:relative;
}

/* subtle noise/scan grid */
body::before{
  content:"";
  position:fixed; inset:0;
  background:
    linear-gradient(rgba(143,123,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(143,123,255,0.045) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(ellipse 80% 70% at 50% 30%, black 40%, transparent 90%);
  z-index:0;
  pointer-events:none;
}

/* floating ambient particles */
.particles{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.particles span{
  position:absolute;
  bottom:-10px;
  width:3px; height:3px;
  border-radius:50%;
  background:var(--accent-2);
  opacity:.5;
  box-shadow:0 0 6px var(--accent);
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{ transform:translateY(0) translateX(0); opacity:0; }
  10%{ opacity:.6; }
  90%{ opacity:.4; }
  to{ transform:translateY(-110vh) translateX(20px); opacity:0; }
}

/* ============ TOPBAR ============ */
.topbar{
  position:fixed; top:0; left:0; width:100%; height:64px;
  display:flex; justify-content:space-between; align-items:center;
  padding:0 18px;
  background:rgba(8,5,20,0.45);
  backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--accent-line);
  z-index:100;
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand .dot{
  width:9px; height:9px; border-radius:50%;
  background:var(--accent-2);
  box-shadow:0 0 10px var(--accent), 0 0 20px var(--accent);
  animation:blink 2.4s ease-in-out infinite;
}
@keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.logo{
  font-family:'Orbitron',sans-serif;
  font-size:19px; font-weight:900; letter-spacing:5px;
  background:linear-gradient(90deg,#c9bcff,#8f7bff);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 25px rgba(143,123,255,0.35);
}
.top-right{ display:flex; align-items:center; gap:14px; }
.clock{ font-size:14px; letter-spacing:2px; color:var(--text-dim); font-variant-numeric:tabular-nums; }
.icon-btn{
  width:38px; height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:var(--accent-soft);
  border:1px solid var(--accent-line);
  cursor:pointer;
  color:var(--accent-2);
  transition:.3s var(--ease);
}
.icon-btn:hover{ background:rgba(143,123,255,0.28); transform:translateY(-1px) scale(1.04); }
.icon-btn svg{ width:18px; height:18px; }

/* ============ HUD / CORE ============ */
.center{
  position:fixed; top:30%; left:50%;
  transform:translate(-50%,-50%);
  width:230px; height:230px;
  display:flex; justify-content:center; align-items:center;
  z-index:5;
}
.ring1,.ring2,.ring3{ position:absolute; border-radius:50%; }
.ring1{
  width:230px; height:230px;
  border:2px solid var(--accent-line);
  box-shadow:0 0 30px rgba(143,123,255,0.25), inset 0 0 30px rgba(143,123,255,0.08);
  animation:rotate 18s linear infinite;
}
.ring1::before,.ring1::after{
  content:""; position:absolute; width:8px; height:8px; border-radius:50%;
  background:var(--accent-2); box-shadow:0 0 10px var(--accent);
  top:-4px; left:50%; margin-left:-4px;
}
.ring1::after{ top:auto; bottom:-4px; }
.ring2{
  width:168px; height:168px;
  border:1.5px dashed var(--accent-line);
  animation:rotateReverse 11s linear infinite;
}
.ring3{
  width:104px; height:104px;
  border:3px solid var(--accent);
  box-shadow:0 0 22px var(--accent);
  animation:pulse 2.2s ease-in-out infinite;
}
.core{
  width:52px; height:52px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #efe9ff, var(--accent) 60%, #5a44c8 100%);
  box-shadow:0 0 25px var(--accent), 0 0 60px rgba(143,123,255,0.6);
  transition:box-shadow .4s var(--ease), background .4s var(--ease), transform .4s var(--ease);
}
.center.speaking .core{
  animation:corePulse .9s ease-in-out infinite;
  box-shadow:0 0 40px var(--accent-2), 0 0 90px rgba(143,123,255,0.8);
}
.center.speaking .ring3{ animation:pulse .8s ease-in-out infinite; }
.center.listening .core{
  box-shadow:0 0 35px var(--danger), 0 0 80px rgba(255,93,122,0.6);
  background:radial-gradient(circle at 35% 30%, #ffe9ee, var(--danger) 60%, #a8264a 100%);
}

@keyframes rotate{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
@keyframes rotateReverse{ from{transform:rotate(360deg);} to{transform:rotate(0deg);} }
@keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
@keyframes corePulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }

.status-label{
  position:fixed; top:calc(30% + 130px); left:50%; transform:translateX(-50%);
  font-size:11px; letter-spacing:3px; color:var(--text-dim);
  text-transform:uppercase; z-index:5; white-space:nowrap;
}

/* ============ CHAT PANEL ============ */
.bottom{
  position:fixed; bottom:0; left:0; width:100%; height:44vh;
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(140%);
  border-top:1px solid var(--accent-line);
  border-radius:22px 22px 0 0;
  display:flex; flex-direction:column;
  padding:14px 14px 12px;
  z-index:100;
  box-shadow:0 -10px 40px rgba(0,0,0,0.35);
}
.bottom-handle{
  width:38px; height:4px; border-radius:4px;
  background:var(--accent-line);
  margin:0 auto 10px;
}

#terminal{
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding-right:6px; margin-bottom:10px;
  display:flex; flex-direction:column; gap:10px;
}
#terminal::-webkit-scrollbar{ width:5px; }
#terminal::-webkit-scrollbar-thumb{ background:var(--accent); border-radius:10px; }
#terminal::-webkit-scrollbar-track{ background:transparent; }

.msg{ display:flex; flex-direction:column; max-width:88%; animation:msgIn .35s var(--ease); }
@keyframes msgIn{ from{ opacity:0; transform:translateY(10px) scale(.985); } to{ opacity:1; transform:translateY(0) scale(1); } }
.msg.user{ margin-left:auto; align-items:flex-end; }
.msg.ai{ align-items:flex-start; }

.bubble{
  font-size:14.5px; line-height:1.55;
  color:var(--text);
  word-wrap:break-word;
  background:none;
  border:none;
  padding:2px 0;
}
.msg.user .bubble{ text-align:right; color:var(--text); }
.bubble .meta{ display:block; font-size:10px; color:var(--text-dim); margin-top:4px; letter-spacing:1px; }

.typing{ display:flex; gap:4px; padding:10px 0; align-items:center; }
.typing span{
  width:6px; height:6px; border-radius:50%; background:var(--accent-2);
  animation:typingDot 1.1s infinite ease-in-out;
}
.typing span:nth-child(2){ animation-delay:.15s; }
.typing span:nth-child(3){ animation-delay:.3s; }
@keyframes typingDot{ 0%,60%,100%{ transform:translateY(0); opacity:.4; } 30%{ transform:translateY(-5px); opacity:1; } }

.msg-text{ white-space:pre-wrap; }
.stream-cursor{
  display:inline-block;
  width:2px; height:1em;
  background:var(--accent-2);
  margin-left:2px;
  vertical-align:text-bottom;
  animation:cursorBlink .9s steps(1) infinite;
  border-radius:1px;
}
@keyframes cursorBlink{ 0%,50%{ opacity:1; } 51%,100%{ opacity:0; } }

/* ============ AI MESSAGE ACTION BAR ============ */
.msg-actions{
  display:flex; align-items:center; gap:2px;
  margin-top:6px;
}
.msg-action-btn{
  width:28px; height:28px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none;
  color:var(--text-dim);
  cursor:pointer;
  transition:.15s;
}
.msg-action-btn svg{ width:15px; height:15px; }
.msg-action-btn:hover{ background:var(--accent-soft); color:var(--accent-2); }
.msg-action-btn.active{ color:var(--accent-2); }
.msg-action-btn.active.like svg{ fill:var(--accent-2); }
.msg-action-btn.active.dislike svg{ fill:var(--accent-2); }

.msg-menu-wrap{ position:relative; }
.msg-menu{
  position:absolute; bottom:34px; left:0;
  min-width:150px;
  background:var(--glass-2);
  border:1px solid var(--accent-line);
  border-radius:12px;
  padding:6px;
  display:none;
  flex-direction:column;
  gap:2px;
  z-index:20;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  backdrop-filter:blur(16px);
}
.msg-menu.open{ display:flex; }
.msg-menu-item{
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:8px;
  font-size:13px; color:var(--text);
  background:none; border:none; cursor:pointer;
  text-align:left; width:100%;
}
.msg-menu-item svg{ width:14px; height:14px; flex-shrink:0; }
.msg-menu-item:hover{ background:var(--accent-soft); color:var(--accent-2); }

/* ============ INPUT ============ */
.input-area{ display:flex; gap:8px; align-items:center; }
.input-wrap{
  flex:1; display:flex; align-items:center;
  background:rgba(5,3,14,0.6);
  border:1px solid var(--accent-line);
  border-radius:16px;
  padding:2px 6px 2px 16px;
  transition:.3s var(--ease);
}
.input-wrap:focus-within{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
input{
  flex:1; padding:13px 4px; background:transparent; border:none; outline:none;
  color:var(--text); font-size:15px; font-family:'Rajdhani',sans-serif;
}
input::placeholder{ color:var(--text-dim); }

.round-btn{
  width:46px; height:46px; border-radius:14px; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:.25s var(--ease);
}
.round-btn:active{ transform:scale(.9); }
.round-btn svg{ width:19px; height:19px; }
.send-btn{
  background:linear-gradient(135deg,var(--accent),#5a44c8);
  color:#fff; margin:4px 4px 4px 0;
  box-shadow:0 0 14px rgba(143,123,255,0.45);
}
.send-btn:active{ transform:scale(.92); }
.mic-btn{
  background:var(--accent-soft);
  border:1px solid var(--accent-line);
  color:var(--accent-2);
}
.mic-btn.rec{
  background:rgba(255,93,122,0.18);
  border-color:rgba(255,93,122,0.5);
  color:var(--danger);
  animation:micPulse 1s infinite;
}
@keyframes micPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(255,93,122,0.4);} 50%{ box-shadow:0 0 0 8px rgba(255,93,122,0);} }

/* ============ SETTINGS MODAL ============ */
.overlay{
  position:fixed; inset:0; background:rgba(4,2,12,0.7);
  backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; opacity:0; pointer-events:none; transition:.3s var(--ease);
}
.overlay.show{ opacity:1; pointer-events:auto; }
.modal{
  width:90%; max-width:380px;
  background:linear-gradient(160deg, rgba(24,16,48,0.95), rgba(12,8,28,0.95));
  border:1px solid var(--accent-line);
  border-radius:20px;
  padding:22px;
  box-shadow:0 0 60px rgba(90,68,200,0.35);
  transform:translateY(14px) scale(.97);
  transition:.35s var(--ease);
}
.overlay.show .modal{ transform:translateY(0) scale(1); }
.modal h2{
  font-family:'Orbitron',sans-serif; font-size:15px; letter-spacing:3px;
  color:var(--accent-2); margin-bottom:16px; text-transform:uppercase;
}
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:11px; letter-spacing:2px; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; }
.field input, .field select{
  width:100%; padding:12px 14px; background:rgba(0,0,0,0.35);
  border:1px solid var(--accent-line); border-radius:12px;
  color:var(--text); font-size:14px; outline:none; font-family:'Rajdhani',sans-serif;
}
.field select{ cursor:pointer; }
.field input:focus, .field select:focus{ border-color:var(--accent); }
.field small{ display:block; margin-top:6px; color:var(--text-dim); font-size:11px; line-height:1.5; }
.field small a{ color:var(--accent-2); }
.modal-actions{ display:flex; gap:10px; margin-top:18px; }
.btn{
  flex:1; padding:12px; border-radius:12px; border:none; cursor:pointer;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:13px; letter-spacing:1px;
  text-transform:uppercase; transition:.2s;
}
.btn-primary{ background:linear-gradient(135deg,var(--accent),#5a44c8); color:#fff; }
.btn-primary:hover{ filter:brightness(1.1); }
.btn-ghost{ background:transparent; border:1px solid var(--accent-line); color:var(--text-dim); }
.btn-ghost:hover{ color:var(--text); }
.key-status{ font-size:11px; margin-top:4px; letter-spacing:1px; }
.key-status.ok{ color:#7be6a0; }
.key-status.bad{ color:var(--danger); }

/* ============ TOAST ============ */
#toastBox{ position:fixed; top:76px; left:50%; transform:translateX(-50%); z-index:2000; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  padding:10px 18px; border-radius:12px; font-size:13px;
  background:rgba(20,14,40,0.9); border:1px solid var(--accent-line);
  color:var(--text); box-shadow:0 6px 24px rgba(0,0,0,0.4);
  animation:toastIn .25s ease, toastOut .3s ease 2.6s forwards;
}
.toast.err{ border-color:rgba(255,93,122,0.5); color:#ffc0cc; }
@keyframes toastIn{ from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);} }
@keyframes toastOut{ to{ opacity:0; transform:translateY(-8px); } }

/* ============ BOOT / SPLASH SCREEN ============ */
#bootScreen{
  position:fixed; inset:0; z-index:9999;
  background:
    radial-gradient(ellipse 90% 60% at 20% 100%, rgba(90,68,200,0.55), transparent 60%),
    radial-gradient(ellipse 90% 60% at 80% 100%, rgba(90,68,200,0.5), transparent 60%),
    linear-gradient(180deg, var(--bg-top) 0%, #0a0620 45%, var(--bg-mid) 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:22px;
  transition:opacity .5s var(--ease), visibility .5s var(--ease);
}
#bootScreen.hide{ opacity:0; visibility:hidden; pointer-events:none; }
.boot-icon-wrap{
  width:132px; height:132px;
  display:flex; align-items:center; justify-content:center;
  animation:bootFloat 2.6s ease-in-out infinite;
}
.boot-icon-wrap img{
  width:100%; height:100%; object-fit:contain;
  filter:drop-shadow(0 0 26px rgba(143,123,255,0.65)) drop-shadow(0 0 60px rgba(90,68,200,0.4));
  animation:bootGlow 2.2s ease-in-out infinite;
}
@keyframes bootFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
@keyframes bootGlow{ 0%,100%{ opacity:.85; } 50%{ opacity:1; } }
.boot-title{
  font-family:'Orbitron',sans-serif; font-weight:700; font-size:26px;
  letter-spacing:8px; color:var(--text);
  text-shadow:0 0 25px rgba(143,123,255,0.5);
}
.boot-sub{
  font-size:12px; letter-spacing:3px; color:var(--text-dim);
  text-transform:uppercase; margin-top:-12px;
}
.boot-bar{
  width:140px; height:3px; border-radius:3px;
  background:rgba(143,123,255,0.15); overflow:hidden;
  margin-top:6px;
}
.boot-bar-fill{
  height:100%; width:40%; border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  animation:bootBarMove 1.1s ease-in-out infinite;
}
@keyframes bootBarMove{
  0%{ transform:translateX(-100%); }
  100%{ transform:translateX(250%); }
}

/* ============ VOICE MODE PAGE ============ */
.voice-page{
  position:fixed; inset:0; z-index:3000;
  background:
    radial-gradient(ellipse 90% 60% at 20% 100%, rgba(90,68,200,0.55), transparent 60%),
    radial-gradient(ellipse 90% 60% at 80% 100%, rgba(90,68,200,0.5), transparent 60%),
    linear-gradient(180deg, var(--bg-top) 0%, #0a0620 45%, var(--bg-mid) 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
  padding:28px 20px 34px;
  opacity:0; pointer-events:none; transform:scale(1.02);
  transition:opacity .4s var(--ease), transform .4s var(--ease);
}
.voice-page.show{ opacity:1; pointer-events:auto; transform:scale(1); }

.voice-top{ width:100%; display:flex; justify-content:space-between; align-items:center; }
.voice-status{
  font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:3px;
  color:var(--accent-2); text-transform:uppercase; opacity:.85;
}
.voice-close{
  width:38px; height:38px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:var(--accent-soft); border:1px solid var(--accent-line);
  color:var(--accent-2); cursor:pointer; transition:.25s var(--ease);
}
.voice-close:hover{ background:rgba(143,123,255,0.28); transform:rotate(90deg); }
.voice-close svg{ width:18px; height:18px; }

.voice-orb-wrap{
  position:relative; width:250px; height:250px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.voice-orb-wrap .ring1{ width:250px; height:250px; }
.voice-orb-wrap .ring2{ width:182px; height:182px; }
.voice-orb-wrap .ring3{ width:112px; height:112px; }
.voice-orb-wrap .core{ width:58px; height:58px; }

.voice-orb-wrap.listening .core{
  box-shadow:0 0 40px var(--danger), 0 0 90px rgba(255,93,122,0.7);
  background:radial-gradient(circle at 35% 30%, #ffe9ee, var(--danger) 60%, #a8264a 100%);
  animation:corePulse .7s var(--ease) infinite;
}
.voice-orb-wrap.listening .ring3{ border-color:var(--danger); box-shadow:0 0 22px var(--danger); animation:pulse .7s var(--ease) infinite; }

.voice-orb-wrap.thinking .core{ animation:corePulse 1.1s var(--ease) infinite; }
.voice-orb-wrap.thinking .ring1{ animation:rotate 3.5s linear infinite; }
.voice-orb-wrap.thinking .ring2{ animation:rotateReverse 2.2s linear infinite; }

.voice-orb-wrap.speaking .core{
  animation:speakPulse .45s ease-in-out infinite alternate;
  box-shadow:0 0 45px var(--accent-2), 0 0 100px rgba(143,123,255,0.85);
}
.voice-orb-wrap.speaking .ring3{ animation:pulse .5s ease-in-out infinite; }
@keyframes speakPulse{ from{ transform:scale(1); } to{ transform:scale(1.22); } }

.voice-caption{
  width:100%; max-width:480px; min-height:80px;
  display:flex; align-items:center; justify-content:center;
  text-align:center; font-size:17px; line-height:1.55;
  color:var(--text); padding:0 8px;
}
.voice-caption .word{ opacity:.55; transition:opacity .15s ease; }
.voice-caption .word.spoken{ opacity:1; color:var(--accent-2); }
.voice-caption.user-line{ color:var(--text-dim); font-size:15px; }

.voice-controls{ display:flex; align-items:center; gap:22px; }
.voice-mic-btn{
  width:72px; height:72px; border-radius:50%; border:none; cursor:pointer;

<script>

/* ============ PARTICLES ============ */
(function(){
  const box = document.getElementById('particles');
  const n = 22;
  for(let i=0;i<n;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100+'%';
    s.style.width = s.style.height = (1.5+Math.random()*2.5)+'px';
    s.style.animationDuration = (8+Math.random()*10)+'s';
    s.style.animationDelay = (Math.random()*10)+'s';
    box.appendChild(s);
  }
})();

/* ============ CLOCK ============ */
function updateClock(){
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}
updateClock();
setInterval(updateClock, 1000);

/* ============ STATE ============ */
const STORAGE_KEY = 'zenq_gemini_api_key';
const STORAGE_MODEL = 'zenq_gemini_model';
const STORAGE_VOICE = 'zenq_voice_pref';
const STORAGE_HISTORY = 'zenq_chat_history';

let apiKey = localStorage.getItem(STORAGE_KEY) || '';
let model = localStorage.getItem(STORAGE_MODEL) || 'gemini-3.5-flash';
let voicePref = localStorage.getItem(STORAGE_VOICE) || 'on';
let chatHistory = JSON.parse(localStorage.getItem(STORAGE_HISTORY) || '[]');

const terminal = document.getElementById("terminal");
const hud = document.getElementById("hud");
const statusLabel = document.getElementById("statusLabel");
const commandInput = document.getElementById("commandInput");

/* ============ TOAST ============ */
function toast(msg, isErr){
  const box = document.getElementById('toastBox');
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  box.appendChild(t);
  setTimeout(()=> t.remove(), 3000);
}

/* ============ RENDER MESSAGE ============ */
function renderMessage(role, text){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = escapeHtml(text) + `<span class="meta">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>`;

  wrap.appendChild(bubble);

  if(role !== 'user'){
    wrap.appendChild(createMsgActions(() => text, wrap));
  }

  terminal.appendChild(wrap);
  terminal.scrollTop = terminal.scrollHeight;
  return wrap;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML.replace(/\n/g,'<br>');
}

/* ============ AI MESSAGE ACTION BAR (like / dislike / menu) ============ */
function createMsgActions(getText, msgWrap){
  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  const likeBtn = document.createElement('button');
  likeBtn.className = 'msg-action-btn like';
  likeBtn.title = 'Good response';
  likeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14Z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`;

  const dislikeBtn = document.createElement('button');
  dislikeBtn.className = 'msg-action-btn dislike';
  dislikeBtn.title = 'Bad response';
  dislikeBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10Z"/><path d="M17 2h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"/></svg>`;

  likeBtn.addEventListener('click', ()=>{
    const active = likeBtn.classList.toggle('active');
    if(active) dislikeBtn.classList.remove('active');
    toast(active ? 'Thanks for the feedback' : 'Feedback removed');
  });
  dislikeBtn.addEventListener('click', ()=>{
    const active = dislikeBtn.classList.toggle('active');
    if(active) likeBtn.classList.remove('active');
    toast(active ? 'Thanks for the feedback' : 'Feedback removed');
  });

  const menuWrap = document.createElement('div');
  menuWrap.className = 'msg-menu-wrap';

  const menuBtn = document.createElement('button');
  menuBtn.className = 'msg-action-btn';
  menuBtn.title = 'More';
  menuBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>`;

  const menu = document.createElement('div');
  menu.className = 'msg-menu';
  menu.innerHTML = `
    <button class="msg-menu-item" data-action="copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>
    <button class="msg-menu-item" data-action="regenerate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Regenerate</button>
    <button class="msg-menu-item" data-action="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>Delete</button>
  `;

  menuBtn.addEventListener('click', (e)=>{
    e.stopPropagation();
    document.querySelectorAll('.msg-menu.open').forEach(m => { if(m !== menu) m.classList.remove('open'); });
    menu.classList.toggle('open');
  });

  menu.addEventListener('click', (e)=>{
    const btn = e.target.closest('.msg-menu-item');
    if(!btn) return;
    const action = btn.dataset.action;
    menu.classList.remove('open');
    if(action === 'copy'){
      const txt = getText();
      if(navigator.clipboard?.writeText){
        navigator.clipboard.writeText(txt).then(()=> toast('Copied to clipboard'));
      }
    } else if(action === 'regenerate'){
      toast('Regenerate coming soon');
    } else if(action === 'delete'){
      if(msgWrap) msgWrap.remove();
    }
  });

  menuWrap.appendChild(menuBtn);
  menuWrap.appendChild(menu);

  actions.appendChild(likeBtn);
  actions.appendChild(dislikeBtn);
  actions.appendChild(menuWrap);

  return actions;
}
document.addEventListener('click', ()=>{
  document.querySelectorAll('.msg-menu.open').forEach(m => m.classList.remove('open'));
});

function showTyping(){
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
  terminal.appendChild(wrap);
  terminal.scrollTop = terminal.scrollHeight;
}
function hideTyping(){
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
}

/* ============ STREAMING BUBBLE ============ */
function createStreamingBubble(){
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const textSpan = document.createElement('span');
  textSpan.className = 'msg-text';

  const cursor = document.createElement('span');
  cursor.className = 'stream-cursor';

  bubble.appendChild(textSpan);
  bubble.appendChild(cursor);
  wrap.appendChild(bubble);
  terminal.appendChild(wrap);
  terminal.scrollTop = terminal.scrollHeight;

  return { wrap, bubble, textSpan, cursor };
}

/* Reveals text word-by-word at a smooth fixed pace, regardless of how
   choppy the underlying network chunks are — this is what gives the
   ChatGPT-style smooth streaming feel. */
class StreamRenderer{
  constructor(textSpan, cursor, onComplete){
    this.textSpan = textSpan;
    this.cursor = cursor;
    this.onComplete = onComplete;
    this.queue = [];
    this.rendered = '';
    this.timer = null;
    this.doneReceiving = false;
    this.completed = false;
  }
  push(chunk){
    if(!chunk) return;
    const parts = chunk.match(/\S+\s*|\s+/g) || [chunk];
    this.queue.push(...parts);
    this._tick();
  }
  finish(){
    this.doneReceiving = true;
    this._tick();
  }
  _tick(){
    if(this.timer) return;
    this.timer = setInterval(()=>{
      if(this.queue.length){
        this.rendered += this.queue.shift();
        this.textSpan.innerHTML = escapeHtml(this.rendered);
        terminal.scrollTop = terminal.scrollHeight;
      } else {
        clearInterval(this.timer);
        this.timer = null;
        if(this.doneReceiving && !this.completed){
          this.completed = true;
          if(this.cursor) this.cursor.remove();
          if(this.onComplete) this.onComplete(this.rendered);
        }
      }
    }, 28);
  }
}

/* ============ SPEAK ============ */
const speechSupported = typeof window !== 'undefined' && 'speechSynthesis' in window && typeof SpeechSynthesisUtterance !== 'undefined';

function speak(text, opts){
  opts = opts || {};
  if(!opts.force && voicePref !== 'on') return;
  if(!speechSupported){
    if(opts.onEnd) opts.onEnd();
    return;
  }
  window.speechSynthesis.cancel();
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.pitch = 1;
  speech.volume = 1;
  speech.onstart = ()=>{ hud.classList.add('speaking'); if(opts.onStart) opts.onStart(); };
  speech.onboundary = (e)=>{ if(opts.onBoundary) opts.onBoundary(e.charIndex); };
  speech.onend = ()=>{ hud.classList.remove('speaking'); if(opts.onEnd) opts.onEnd(); };
  window.speechSynthesis.speak(speech);
  return speech;
}

/* ============ GEMINI API (STREAMING) ============ */
// onChunk(deltaText) fires for every incoming piece of text as it streams in.
// Returns the final full reply text (also used for history/voice/localStorage).
async function askAI(message, onChunk){
  if(!apiKey){
    openSettings();
    toast('Add your Gemini API key first', true);
    return null;
  }

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?alt=sse`;

  const contents = chatHistory.map(m => ({
    role: m.role === 'user' ? 'user' : 'model',
    parts: [{ text: m.text }]
  }));
  contents.push({ role:'user', parts:[{ text: message }] });

  let fullText = '';
  let blockedBySafety = false;

  try{
    const response = await fetch(url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-goog-api-key': apiKey
      },
      body: JSON.stringify({
        systemInstruction:{
          parts:[{ text:'You are ZenQ, a witty, sharp, futuristic AI assistant. Keep replies concise, confident, and helpful. Address the user respectfully but with personality.' }]
        },
        contents: contents,
        generationConfig:{
          temperature: 0.85,
          maxOutputTokens: 800
        }
      })
    });

    if(!response.ok || !response.body){
      let errMsg = `Request failed (${response.status})`;
      try{
        const errData = await response.json();
        errMsg = errData?.error?.message || errMsg;
      }catch(_){}
      throw new Error(errMsg);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while(true){
      const { done, value } = await reader.read();
      if(done) break;

      buffer += decoder.decode(value, { stream:true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // last (possibly incomplete) line stays in buffer

      for(const line of lines){
        const trimmed = line.trim();
        if(!trimmed.startsWith('data:')) continue;
        const jsonStr = trimmed.slice(5).trim();
        if(!jsonStr) continue;

        try{
          const parsed = JSON.parse(jsonStr);
          const delta = parsed?.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
          if(delta){
            fullText += delta;
            if(onChunk) onChunk(delta);
          }
          if(parsed?.candidates?.[0]?.finishReason === 'SAFETY'){
            blockedBySafety = true;
          }
        }catch(e){
          // partial/malformed JSON chunk - skip, next chunk will complete it
        }
      }
    }

    if(!fullText && blockedBySafety){
      return 'That request was blocked by safety filters. Try rephrasing, boss.';
    }

    return fullText.trim() || 'No response received from Gemini.';
  }
  catch(err){
    console.error(err);
    toast(err.message || 'AI connection failed', true);
    return 'Connection error: ' + (err.message || 'unable to reach Gemini API.');
  }
}

/* ============ RUN COMMAND ============ */
async function runCommand(textInput){
  const command = (textInput || commandInput.value).trim();
  if(command === '') return;

  renderMessage('user', command);
  chatHistory.push({ role:'user', text: command });
  commandInput.value = '';

  showTyping();
  statusLabel.textContent = 'PROCESSING...';

  let renderer = null;
  let streamBubble = null;
  let firstChunk = true;

  const reply = await askAI(command, (delta)=>{
    if(firstChunk){
      firstChunk = false;
      hideTyping();
      streamBubble = createStreamingBubble();
      renderer = new StreamRenderer(streamBubble.textSpan, streamBubble.cursor, (finalText)=>{
        const meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
        streamBubble.bubble.appendChild(meta);
        streamBubble.wrap.appendChild(createMsgActions(() => finalText, streamBubble.wrap));
        terminal.scrollTop = terminal.scrollHeight;
      });
      statusLabel.textContent = 'STREAMING...';
    }
    renderer.push(delta);
  });

  hideTyping();
  statusLabel.textContent = 'SYSTEM ONLINE';

  if(reply){
    if(renderer){
      renderer.finish();
    } else {
      // no chunks ever arrived (e.g. error before streaming started) - fall back
      renderMessage('ai', reply);
    }
    chatHistory.push({ role:'model', text: reply });
    trimHistory();
    localStorage.setItem(STORAGE_HISTORY, JSON.stringify(chatHistory));
    speak(reply);
  }
}

function trimHistory(){
  if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
}

document.getElementById('sendBtn').addEventListener('click', ()=> runCommand());
commandInput.addEventListener('keypress', function(e){
  if(e.key === 'Enter') runCommand();
});

/* ============ MIC / SPEECH RECOGNITION ============ */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('micBtn');

if(SpeechRecognition){
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;

  window.startListening = function(){
    hud.classList.add('listening');
    micBtn.classList.add('rec');
    statusLabel.textContent = 'LISTENING...';
    try{ recognition.start(); } catch(e){}
  };

  recognition.onresult = function(event){
    const voice = event.results[0][0].transcript;
    runCommand(voice);
  };

  recognition.onerror = function(event){
    toast('Mic error: ' + event.error, true);
  };

  recognition.onend = function(){
    hud.classList.remove('listening');
    micBtn.classList.remove('rec');
    if(statusLabel.textContent === 'LISTENING...') statusLabel.textContent = 'SYSTEM ONLINE';
  };

  micBtn.addEventListener('click', window.startListening);
}
else{
  micBtn.addEventListener('click', ()=> toast('Mic not supported in this browser', true));
}

/* ============ VOICE MODE (dedicated full-screen page) ============ */
const voicePage = document.getElementById('voicePage');
const voiceLaunchBtn = document.getElementById('voiceLaunchBtn');
const voiceCloseBtn = document.getElementById('voiceCloseBtn');
const voiceMicBtn = document.getElementById('voiceMicBtn');
const voiceOrb = document.getElementById('voiceOrb');
const voiceCaption = document.getElementById('voiceCaption');
const voiceStatusLabel = document.getElementById('voiceStatusLabel');

let voiceRecognition = null;
if(SpeechRecognition){
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'en-US';
  voiceRecognition.continuous = false;
  voiceRecognition.interimResults = true;
}

function setVoiceOrbState(state){
  voiceOrb.classList.remove('listening','thinking','speaking');
  if(state) voiceOrb.classList.add(state);
}

function setVoiceCaption(text, isUser){
  voiceCaption.classList.toggle('user-line', !!isUser);
  voiceCaption.textContent = text;
}

function cancelSpeech(){
  if(speechSupported) window.speechSynthesis.cancel();
}

function openVoiceMode(){
  cancelSpeech();
  voicePage.classList.add('show');
  setVoiceOrbState(null);
  setVoiceCaption('Tap the mic and start talking to ZenQ.');
  voiceStatusLabel.textContent = 'TAP TO SPEAK';
}
function closeVoiceMode(){
  voicePage.classList.remove('show');
  if(voiceRecognition){ try{ voiceRecognition.stop(); }catch(e){} }
  cancelSpeech();
  setVoiceOrbState(null);
  voiceMicBtn.classList.remove('rec');
}

voiceLaunchBtn.addEventListener('click', openVoiceMode);
voiceCloseBtn.addEventListener('click', closeVoiceMode);

if(voiceRecognition){
  voiceMicBtn.addEventListener('click', ()=>{
    cancelSpeech();
    setVoiceOrbState('listening');
    voiceMicBtn.classList.add('rec');
    voiceStatusLabel.textContent = 'LISTENING...';
    setVoiceCaption('Listening...', true);
    try{ voiceRecognition.start(); }catch(e){}
  });

  voiceRecognition.onresult = (event)=>{
    let transcript = '';
    for(let i=0;i<event.results.length;i++){
      transcript += event.results[i][0].transcript;
    }
    if(event.results[event.results.length-1].isFinal){
      handleVoiceTurn(transcript.trim());
    } else {
      setVoiceCaption(transcript, true);
    }
  };

  voiceRecognition.onerror = (event)=>{
    toast('Mic error: ' + event.error, true);
    setVoiceOrbState(null);
    voiceMicBtn.classList.remove('rec');
    voiceStatusLabel.textContent = 'TAP TO SPEAK';
  };

  voiceRecognition.onend = ()=>{
    voiceMicBtn.classList.remove('rec');
  };
} else {
  voiceMicBtn.addEventListener('click', ()=> toast('Mic not supported in this browser', true));
}

async function handleVoiceTurn(userText){
  if(!userText) return;
  setVoiceCaption(userText, true);
  voiceStatusLabel.textContent = 'THINKING...';
  setVoiceOrbState('thinking');

  chatHistory.push({ role:'user', text: userText });

  const reply = await askAI(userText, ()=>{ /* full reply spoken at once in voice mode */ });

  if(!reply){
    setVoiceOrbState(null);
    voiceStatusLabel.textContent = 'TAP TO SPEAK';
    return;
  }

  chatHistory.push({ role:'model', text: reply });
  trimHistory();
  localStorage.setItem(STORAGE_HISTORY, JSON.stringify(chatHistory));

  // keep the regular chat log in sync so it's there when the user goes back
  renderMessage('user', userText);
  renderMessage('ai', reply);

  speakVoiceReply(reply);
}

/* Speaks the reply while highlighting each word in sync via the
   SpeechSynthesisUtterance boundary event - the "AI reply voice animation". */
function speakVoiceReply(text){
  const tokens = text.split(/(\s+)/);
  voiceCaption.classList.remove('user-line');
  voiceCaption.innerHTML = '';
  const spans = [];
  let charPos = 0;
  tokens.forEach(chunk=>{
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = chunk;
    if(chunk.trim() !== '') spans.push({ el:span, start:charPos });
    charPos += chunk.length;
    voiceCaption.appendChild(span);
  });

  setVoiceOrbState('speaking');
  voiceStatusLabel.textContent = 'SPEAKING...';

  speak(text, {
    force:true,
    onBoundary:(charIndex)=>{
      spans.forEach(s => s.el.classList.toggle('spoken', s.start <= charIndex));
    },
    onEnd:()=>{
      spans.forEach(s => s.el.classList.add('spoken'));
      setVoiceOrbState(null);
      voiceStatusLabel.textContent = 'TAP TO SPEAK';
    }
  });
}

/* ============ SETTINGS MODAL ============ */
const overlay = document.getElementById('settingsOverlay');
const apiKeyInput = document.getElementById('apiKeyInput');
const modelSelect = document.getElementById('modelSelect');
const voiceToggle = document.getElementById('voiceToggle');
const keyStatus = document.getElementById('keyStatus');

function openSettings(){
  apiKeyInput.value = apiKey;
  modelSelect.value = model;
  voiceToggle.value = voicePref;
  overlay.classList.add('show');
}
function closeSettings(){ overlay.classList.remove('show'); }

document.getElementById('settingsBtn').addEventListener('click', openSettings);
overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeSettings(); });

document.getElementById('saveSettingsBtn').addEventListener('click', ()=>{
  apiKey = apiKeyInput.value.trim();
  model = modelSelect.value;
  voicePref = voiceToggle.value;

  localStorage.setItem(STORAGE_KEY, apiKey);
  localStorage.setItem(STORAGE_MODEL, model);
  localStorage.setItem(STORAGE_VOICE, voicePref);

  closeSettings();
  toast(apiKey ? 'Settings saved' : 'Settings saved (no API key set)');
});

document.getElementById('clearChatBtn').addEventListener('click', ()=>{
  chatHistory = [];
  localStorage.removeItem(STORAGE_HISTORY);
  terminal.innerHTML = '';
  renderMessage('ai', 'Chat history cleared. Ready when you are, boss.');
  closeSettings();
});

/* ============ STARTUP ============ */
window.onload = () => {
  if(chatHistory.length){
    chatHistory.forEach(m => renderMessage(m.role === 'user' ? 'user' : 'ai', m.text));
  } else {
    renderMessage('ai', 'ZenQ online. All systems nominal.');
  }

  if(!apiKey){
    setTimeout(()=>{
      toast('Add your Gemini API key in Settings to get started');
      openSettings();
    }, 800);
  } else {
    setTimeout(()=> speak('Welcome back, boss. ZenQ online.'), 600);
  }

  // Dismiss the boot/splash screen once the app shell is ready.
  const bootScreen = document.getElementById('bootScreen');
  if(bootScreen){
    setTimeout(()=>{
      bootScreen.classList.add('hide');
      setTimeout(()=> bootScreen.remove(), 600);
    }, 900);
  }
};

/* ============ PWA / OFFLINE SUPPORT ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('ZenQ service worker registered:', reg.scope))
      .catch(err => console.warn('Service worker registration failed:', err));
  });
}

</script>
